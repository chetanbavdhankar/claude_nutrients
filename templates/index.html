<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriPlan — Smart Meal Planner</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   CSS RESET & VARIABLES
   ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-deep:    #0f0f1a;
  --bg-card:    rgba(255,255,255,0.04);
  --bg-glass:   rgba(255,255,255,0.06);
  --border:     rgba(255,255,255,0.08);
  --text:       #e8e8ef;
  --text-dim:   #8b8ba3;
  --text-bright:#ffffff;
  --accent:     #6c63ff;
  --accent-glow:rgba(108,99,255,0.35);
  --green:      #34d399;
  --green-glow: rgba(52,211,153,0.25);
  --orange:     #fb923c;
  --orange-glow:rgba(251,146,60,0.25);
  --pink:       #f472b6;
  --red:        #ef4444;
  --yellow:     #fbbf24;
  --cyan:       #22d3ee;
  --radius:     16px;
  --radius-sm:  10px;
  --radius-xs:  6px;
  --shadow:     0 8px 32px rgba(0,0,0,0.4);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* Animated gradient background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(108,99,255,0.12), transparent),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(52,211,153,0.08), transparent),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(244,114,182,0.06), transparent);
  animation: bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift {
  0%   { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(30deg); }
}

/* ═══════════════════════════════════════════════════════════════
   TYPOGRAPHY
   ═══════════════════════════════════════════════════════════════ */
h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; letter-spacing: -0.02em; }
h2 { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; letter-spacing: -0.01em; }
h3 { font-size: 1.1rem; font-weight: 600; }

/* ═══════════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════════ */
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

/* ═══════════════════════════════════════════════════════════════
   SCREENS — fade transitions
   ═══════════════════════════════════════════════════════════════ */
.screen {
  display: none;
}
.screen.active {
  display: block;
  animation: screenIn 0.45s ease both;
}
@keyframes screenIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════════════
   SCREEN 1 — LANDING / QUESTIONNAIRE
   ═══════════════════════════════════════════════════════════════ */
#landing {
  min-height: 100vh;
  flex-direction: column;
  justify-content: center; align-items: center;
  padding: 40px 24px;
}
#landing.active { display: flex; animation: screenIn 0.45s ease both; }

.brand {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeUp 0.8s ease both;
}
.brand-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--accent), var(--green));
  border-radius: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 36px;
  margin-bottom: 16px;
  box-shadow: 0 12px 40px var(--accent-glow);
}
.brand h1 {
  background: linear-gradient(135deg, var(--text-bright), var(--accent));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.brand p { color: var(--text-dim); margin-top: 8px; font-size: 1.05rem; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(30px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Form card */
.form-card {
  background: var(--bg-glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px;
  width: 100%;
  max-width: 680px;
  box-shadow: var(--shadow);
  animation: fadeUp 0.8s 0.2s ease both;
}

.form-section {
  margin-bottom: 36px;
}
.form-section:last-of-type { margin-bottom: 0; }

.form-label {
  display: block;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text-bright);
  font-size: 0.95rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.form-label .label-hint {
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  color: var(--text-dim);
  font-size: 0.82rem;
  margin-left: 6px;
}

/* Pill selectors (dietary, cuisine) */
.pill-group {
  display: flex; flex-wrap: wrap; gap: 10px;
}
.pill {
  padding: 10px 22px;
  border-radius: 50px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-dim);
  font-size: 0.92rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  user-select: none;
}
.pill:hover {
  border-color: var(--accent);
  color: var(--text);
  background: rgba(108,99,255,0.08);
}
.pill.selected {
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(108,99,255,0.08));
  color: var(--text-bright);
  box-shadow: 0 0 20px var(--accent-glow);
}
.pill .pill-emoji { margin-right: 6px; }

/* Slider controls */
.slider-row {
  display: flex; align-items: center; gap: 16px;
}
.slider-row input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--green));
  outline: none;
  opacity: 0.85;
  transition: opacity 0.2s;
}
.slider-row input[type=range]:hover { opacity: 1; }
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text-bright);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  cursor: pointer;
}
.slider-row input[type=range]::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text-bright);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  cursor: pointer;
  border: none;
}
.slider-value {
  min-width: 80px;
  text-align: center;
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--text-bright);
  font-variant-numeric: tabular-nums;
}
.slider-unit {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-dim);
  display: block;
}

/* Generate button */
.btn-generate {
  display: block;
  width: 100%;
  margin-top: 36px;
  padding: 18px 32px;
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 8px 30px var(--accent-glow);
  letter-spacing: 0.02em;
  position: relative;
  overflow: hidden;
}
.btn-generate:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px var(--accent-glow);
}
.btn-generate:active { transform: translateY(0); }
.btn-generate:disabled {
  opacity: 0.5; cursor: not-allowed; transform: none;
}
.btn-generate .spinner {
  display: none;
  width: 22px; height: 22px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto;
}
.btn-generate.loading .btn-text { display: none; }
.btn-generate.loading .spinner  { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════════════════
   SCREEN 2 — RESULTS
   ═══════════════════════════════════════════════════════════════ */
#results { padding: 32px 0 80px; }
#results.active { display: block; animation: screenIn 0.45s ease both; }

/* Top bar */
.results-header {
  display: flex; flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}
.results-header h2 {
  background: linear-gradient(135deg, var(--text-bright), var(--green));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.btn-back {
  padding: 10px 20px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.9rem;
}
.btn-back:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); }

/* Summary stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  text-align: center;
}
.stat-value {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--text-bright);
  font-variant-numeric: tabular-nums;
}
.stat-label {
  font-size: 0.78rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* Tab navigation */
.tab-nav {
  display: flex; gap: 4px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 28px;
  width: fit-content;
}
.tab-btn {
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius-xs);
  background: transparent;
  color: var(--text-dim);
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: var(--transition);
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeUp 0.4s ease; }

/* ─── Meal Plan Tab ─── */
.day-card {
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  transition: var(--transition);
}
.day-card:hover { border-color: rgba(108,99,255,0.3); }

.day-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 24px;
  cursor: pointer;
  user-select: none;
}
.day-header:hover { background: rgba(255,255,255,0.02); }
.day-title {
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--text-bright);
}
.day-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 0.85rem;
}
.day-cal {
  font-weight: 700;
  color: var(--green);
  font-variant-numeric: tabular-nums;
}
.day-badge {
  padding: 3px 10px;
  border-radius: 50px;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.day-badge.ok {
  background: var(--green-glow);
  color: var(--green);
}
.day-badge.approx {
  background: var(--orange-glow);
  color: var(--orange);
}
.chevron {
  color: var(--text-dim);
  transition: transform 0.3s ease;
  font-size: 1.1rem;
}
.day-card.open .chevron { transform: rotate(180deg); }

.day-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.day-card.open .day-body {
  max-height: 800px;
}
.day-body-inner {
  padding: 0 24px 20px;
}

/* Meal rows */
.meal-row {
  display: grid;
  grid-template-columns: 110px 1fr 80px;
  gap: 12px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.meal-row:last-child { border-bottom: none; }

.meal-cat {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 4px 12px;
  border-radius: 50px;
  text-align: center;
  white-space: nowrap;
}
.meal-cat.breakfast { background: rgba(251,191,36,0.15); color: var(--yellow); }
.meal-cat.snack     { background: rgba(244,114,182,0.15); color: var(--pink); }
.meal-cat.lunch     { background: rgba(52,211,153,0.15);  color: var(--green); }
.meal-cat.dinner    { background: rgba(108,99,255,0.15);  color: var(--accent); }
.meal-cat.tea       { background: rgba(34,211,238,0.15);  color: var(--cyan); }

.meal-info { min-width: 0; }
.meal-name {
  font-weight: 600; color: var(--text-bright);
  font-size: 0.95rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.meal-detail {
  font-size: 0.78rem; color: var(--text-dim); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.meal-kcal {
  text-align: right;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

/* Expandable recipe tooltip */
.meal-row-wrap { position: relative; }
.meal-row-wrap .recipe-tip {
  display: none;
  padding: 10px 16px;
  font-size: 0.82rem;
  color: var(--text-dim);
  background: rgba(0,0,0,0.2);
  border-radius: var(--radius-xs);
  margin-bottom: 8px;
  line-height: 1.5;
}
.meal-row-wrap .recipe-tip b { color: var(--text); }
.meal-row-wrap.expanded .recipe-tip { display: block; }

/* Nutrient score mini bar */
.score-bar {
  display: inline-flex; gap: 2px; margin-left: 8px; vertical-align: middle;
}
.score-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border);
}
.score-dot.filled { background: var(--green); }

/* ─── Grocery Tab ─── */
.grocery-section {
  margin-bottom: 24px;
}
.aisle-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.aisle-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-xs);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}
.aisle-icon.produce        { background: rgba(52,211,153,0.15); }
.aisle-icon.dairy          { background: rgba(251,191,36,0.15); }
.aisle-icon.meat           { background: rgba(239,68,68,0.15); }
.aisle-icon.dry            { background: rgba(251,146,60,0.15); }
.aisle-icon.spices         { background: rgba(108,99,255,0.15); }
.aisle-icon.other          { background: rgba(34,211,238,0.15); }
.aisle-name { font-weight: 700; color: var(--text-bright); font-size: 0.95rem; }
.aisle-count { color: var(--text-dim); font-size: 0.8rem; }

.grocery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}
.grocery-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: var(--transition);
  user-select: none;
}
.grocery-item:hover { background: rgba(255,255,255,0.06); }
.grocery-item.checked {
  opacity: 0.4;
  text-decoration: line-through;
}
.grocery-check {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: var(--transition);
  font-size: 0.7rem;
  color: transparent;
}
.grocery-item.checked .grocery-check {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.grocery-item-name {
  font-size: 0.88rem;
  color: var(--text);
  text-transform: capitalize;
}
.grocery-item-count {
  margin-left: auto;
  font-size: 0.72rem;
  color: var(--text-dim);
  white-space: nowrap;
}

/* ─── Savings Tab ─── */
.savings-hero {
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(135deg, rgba(52,211,153,0.08), rgba(108,99,255,0.06));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 28px;
}
.savings-hero .big-number {
  font-size: 3.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--green), var(--cyan));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
}
.savings-hero .big-label {
  font-size: 1rem;
  color: var(--text-dim);
  margin-top: 8px;
}
.savings-table {
  width: 100%;
  border-collapse: collapse;
}
.savings-table th {
  text-align: left;
  font-size: 0.75rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.savings-table td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
}
.savings-table td:first-child { text-transform: capitalize; color: var(--text-bright); }
.savings-table .bar-cell { width: 40%; }
.reuse-bar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.reuse-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--cyan));
  border-radius: 4px;
  transition: width 0.6s ease;
}

/* ═══════════════════════════════════════════════════════════════
   EXPORT TOOLBAR
   ═══════════════════════════════════════════════════════════════ */
.export-bar {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 28px;
}
.btn-export {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-glass);
  color: var(--text);
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-export:hover {
  border-color: var(--accent);
  background: rgba(108,99,255,0.08);
  transform: translateY(-1px);
}
.btn-export svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; }

/* ═══════════════════════════════════════════════════════════════
   PRINT STYLES
   ═══════════════════════════════════════════════════════════════ */
@media print {
  body { background: #fff !important; color: #111 !important; }
  body::before { display: none; }
  .btn-back, .btn-export, .export-bar, .tab-nav, .btn-generate,
  #landing, .stats-bar { display: none !important; }
  .screen, .tab-panel { display: block !important; opacity: 1 !important; transform: none !important; }
  .day-card { break-inside: avoid; border: 1px solid #ccc; background: #fff; }
  .day-body { max-height: none !important; }
  .meal-cat, .day-badge { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .grocery-item { background: #f9f9f9; border: 1px solid #ddd; }
  .grocery-check { border-color: #999; }
  * { color: #111 !important; -webkit-text-fill-color: #111 !important; }
  .day-title, .meal-name, .aisle-name { font-weight: 700 !important; }
  .results-header h2 { -webkit-text-fill-color: #111 !important; }
}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 600px) {
  .form-card { padding: 24px 18px; }
  .meal-row { grid-template-columns: 80px 1fr 60px; gap: 8px; }
  .grocery-grid { grid-template-columns: 1fr; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .tab-nav { width: 100%; }
  .tab-btn { flex: 1; text-align: center; padding: 10px 8px; font-size: 0.82rem; }
  .export-bar { flex-direction: column; }
  .btn-export { justify-content: center; }
}

/* ═══════════════════════════════════════════════════════════════
   TOAST NOTIFICATION
   ═══════════════════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: rgba(52,211,153,0.95);
  color: #fff;
  padding: 14px 28px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.9rem;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  z-index: 1000;
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     TOAST
     ═══════════════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     SCREEN 1 — LANDING / QUESTIONNAIRE
     ═══════════════════════════════════════════════════════════ -->
<div id="landing" class="screen active">
  <div class="brand">
    <div class="brand-icon">&#127860;</div>
    <h1>NutriPlan</h1>
    <p>Smart meal planning that minimizes your grocery bill</p>
  </div>

  <div class="form-card">
    <!-- CALORIES -->
    <div class="form-section">
      <label class="form-label">
        Daily Calorie Goal
        <span class="label-hint">Drag to set your target</span>
      </label>
      <div class="slider-row">
        <input type="range" id="cal-slider" min="1200" max="3500" value="2000" step="50">
        <div>
          <span class="slider-value" id="cal-display">2000</span>
          <span class="slider-unit">kcal / day</span>
        </div>
      </div>
    </div>

    <!-- DIETARY -->
    <div class="form-section">
      <label class="form-label">
        Dietary Preference
        <span class="label-hint">Pick one or more</span>
      </label>
      <div class="pill-group" id="diet-group">
        <div class="pill" data-value="Vegan"><span class="pill-emoji">&#127793;</span>Vegan</div>
        <div class="pill" data-value="Veg"><span class="pill-emoji">&#129388;</span>Vegetarian</div>
        <div class="pill selected" data-value="Non-Veg"><span class="pill-emoji">&#127830;</span>Non-Veg</div>
      </div>
    </div>

    <!-- CUISINE -->
    <div class="form-section">
      <label class="form-label">
        Cuisine Preference
        <span class="label-hint">Select one or more — or leave all for variety</span>
      </label>
      <div class="pill-group" id="cuisine-group">
        <div class="pill selected" data-value="Indian"><span class="pill-emoji">&#127835;</span>Indian</div>
        <div class="pill selected" data-value="European"><span class="pill-emoji">&#129366;</span>European</div>
        <div class="pill selected" data-value="Fusion"><span class="pill-emoji">&#127758;</span>Fusion</div>
      </div>
    </div>

    <!-- DURATION -->
    <div class="form-section">
      <label class="form-label">
        Plan Duration
        <span class="label-hint">How many days to plan</span>
      </label>
      <div class="slider-row">
        <input type="range" id="days-slider" min="1" max="14" value="7" step="1">
        <div>
          <span class="slider-value" id="days-display">7</span>
          <span class="slider-unit">days</span>
        </div>
      </div>
    </div>

    <button class="btn-generate" id="btn-generate" onclick="generatePlan()">
      <span class="btn-text">Generate My Meal Plan &#10230;</span>
      <span class="spinner"></span>
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     SCREEN 2 — RESULTS
     ═══════════════════════════════════════════════════════════ -->
<div id="results" class="screen">
  <div class="container">

    <div class="results-header">
      <h2 id="results-title">Your Meal Plan</h2>
      <button class="btn-back" onclick="goBack()">&#8592; New Plan</button>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Export buttons -->
    <div class="export-bar">
      <button class="btn-export" onclick="exportText()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Download Plan (.txt)
      </button>
      <button class="btn-export" onclick="exportGroceryText()">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Grocery List (.txt)
      </button>
      <button class="btn-export" onclick="exportCalendar()">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Calendar Events (.ics)
      </button>
      <button class="btn-export" onclick="window.print()">
        <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
    </div>

    <!-- Tabs -->
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('meals')">Meal Plan</button>
      <button class="tab-btn" onclick="switchTab('grocery')">Grocery List</button>
      <button class="tab-btn" onclick="switchTab('savings')">Savings</button>
    </div>

    <!-- MEALS PANEL -->
    <div class="tab-panel active" id="panel-meals"></div>

    <!-- GROCERY PANEL -->
    <div class="tab-panel" id="panel-grocery"></div>

    <!-- SAVINGS PANEL -->
    <div class="tab-panel" id="panel-savings"></div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT
     ═══════════════════════════════════════════════════════════ -->
<script>
/* ─── State ─── */
let planData = null;

/* ─── Slider live display ─── */
const calSlider = document.getElementById('cal-slider');
const calDisp   = document.getElementById('cal-display');
calSlider.addEventListener('input', () => calDisp.textContent = calSlider.value);

const daysSlider = document.getElementById('days-slider');
const daysDisp   = document.getElementById('days-display');
daysSlider.addEventListener('input', () => daysDisp.textContent = daysSlider.value);

/* ─── Pill selection — both dietary and cuisine are multi-select ─── */
function setupMultiPills(groupId) {
  document.querySelectorAll('#' + groupId + ' .pill').forEach(pill => {
    pill.addEventListener('click', () => {
      pill.classList.toggle('selected');
      // Ensure at least one stays selected
      const group = document.querySelectorAll('#' + groupId + ' .pill.selected');
      if (group.length === 0) pill.classList.add('selected');
    });
  });
}
setupMultiPills('diet-group');
setupMultiPills('cuisine-group');

/* ─── Screen transitions ─── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function goBack() {
  showScreen('landing');
}

/* ─── Toast ─── */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ─── Tab switching ─── */
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

/* ─── Generate Plan (API call) ─── */
async function generatePlan() {
  const btn = document.getElementById('btn-generate');
  btn.classList.add('loading');
  btn.disabled = true;

  const calories = parseInt(calSlider.value);
  const days = parseInt(daysSlider.value);
  const dietary = [...document.querySelectorAll('#diet-group .pill.selected')].map(p => p.dataset.value);
  const cuisines = [...document.querySelectorAll('#cuisine-group .pill.selected')].map(p => p.dataset.value);

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ calories, days, dietary, cuisines }),
    });
    planData = await resp.json();
    renderResults();
    showScreen('results');
  } catch (err) {
    toast('Something went wrong. Please try again.');
    console.error(err);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

/* ─── Render Results ─── */
function renderResults() {
  const { plan, grocery, savings, settings } = planData;

  // Title
  const dietLabel = Array.isArray(settings.dietary) ? settings.dietary.join(' + ') : settings.dietary;
  document.getElementById('results-title').textContent =
    `Your ${settings.days}-Day ${dietLabel} Plan`;

  // Stats bar
  const totalCal = plan.reduce((s, d) => s + d.total_calories, 0);
  const totalMeals = plan.reduce((s, d) => s + d.meals.length, 0);
  const groceryCount = Object.values(grocery).reduce((s, aisle) => s + Object.keys(aisle).length, 0);

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-value">${settings.days}</div><div class="stat-label">Days Planned</div></div>
    <div class="stat-card"><div class="stat-value">${totalMeals}</div><div class="stat-label">Total Meals</div></div>
    <div class="stat-card"><div class="stat-value">${groceryCount}</div><div class="stat-label">Unique Items</div></div>
    <div class="stat-card"><div class="stat-value">${savings.saved}</div><div class="stat-label">Purchases Saved</div></div>
  `;

  renderMeals(plan);
  renderGrocery(grocery);
  renderSavings(savings);
}

/* ─── Render Meal Plan ─── */
function renderMeals(plan) {
  const container = document.getElementById('panel-meals');
  const weekdays = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday',
                    'Day 8','Day 9','Day 10','Day 11','Day 12','Day 13','Day 14'];

  container.innerHTML = plan.map((day, i) => {
    const dayLabel = i < 7 ? weekdays[i] : `Day ${day.day}`;
    const badge = day.on_target
      ? '<span class="day-badge ok">On Target</span>'
      : `<span class="day-badge approx">${day.diff_pct > 0 ? '+' : ''}${day.diff_pct}%</span>`;

    const mealsHtml = day.meals.map(m => {
      const catClass = m.category.toLowerCase();
      const scoreHtml = renderScoreDots(m.nutrient_score);
      return `
        <div class="meal-row-wrap" onclick="this.classList.toggle('expanded')">
          <div class="meal-row">
            <span class="meal-cat ${catClass}">${m.category}</span>
            <div class="meal-info">
              <div class="meal-name">${m.name} ${scoreHtml}</div>
              <div class="meal-detail">${m.cuisine} &middot; ${m.nutrients}</div>
            </div>
            <div class="meal-kcal">${m.calories}</div>
          </div>
          <div class="recipe-tip">
            <b>Ingredients:</b> ${m.ingredients}<br>
            <b>Recipe:</b> ${m.recipe}
          </div>
        </div>`;
    }).join('');

    const openClass = i === 0 ? ' open' : '';
    return `
      <div class="day-card${openClass}" id="day-${day.day}">
        <div class="day-header" onclick="toggleDay(${day.day})">
          <span class="day-title">${dayLabel} &mdash; Day ${day.day}</span>
          <div class="day-meta">
            <span class="day-cal">${day.total_calories} kcal</span>
            ${badge}
            <span class="chevron">&#9662;</span>
          </div>
        </div>
        <div class="day-body"><div class="day-body-inner">${mealsHtml}</div></div>
      </div>`;
  }).join('');
}

function renderScoreDots(score) {
  let html = '<span class="score-bar">';
  for (let i = 0; i < 10; i++) {
    html += `<span class="score-dot${i < score ? ' filled' : ''}"></span>`;
  }
  return html + '</span>';
}

function toggleDay(day) {
  document.getElementById('day-' + day).classList.toggle('open');
}

/* ─── Render Grocery ─── */
const aisleIcons = {
  'Produce': ['&#129382;', 'produce'],
  'Dairy & Eggs': ['&#129472;', 'dairy'],
  'Meat & Fish': ['&#129385;', 'meat'],
  'Dry Goods & Grains': ['&#127806;', 'dry'],
  'Spices & Condiments': ['&#129476;', 'spices'],
  'Other': ['&#128230;', 'other'],
};

function renderGrocery(grocery) {
  const container = document.getElementById('panel-grocery');
  let html = '';

  for (const [aisle, items] of Object.entries(grocery)) {
    const [icon, cls] = aisleIcons[aisle] || ['&#128230;', 'other'];
    const count = Object.keys(items).length;

    const itemsHtml = Object.entries(items).map(([name, dishes]) => `
      <div class="grocery-item" onclick="this.classList.toggle('checked')">
        <span class="grocery-check">&#10003;</span>
        <span class="grocery-item-name">${name}</span>
        <span class="grocery-item-count">${dishes.length} meal${dishes.length > 1 ? 's' : ''}</span>
      </div>
    `).join('');

    html += `
      <div class="grocery-section">
        <div class="aisle-header">
          <div class="aisle-icon ${cls}">${icon}</div>
          <span class="aisle-name">${aisle}</span>
          <span class="aisle-count">(${count} item${count > 1 ? 's' : ''})</span>
        </div>
        <div class="grocery-grid">${itemsHtml}</div>
      </div>`;
  }
  container.innerHTML = html;
}

/* ─── Render Savings ─── */
function renderSavings(savings) {
  const container = document.getElementById('panel-savings');
  const maxCount = savings.reused_ingredients.length > 0
    ? savings.reused_ingredients[0].count : 1;

  const rows = savings.reused_ingredients.slice(0, 25).map(item => `
    <tr>
      <td>${item.name}</td>
      <td style="text-align:center;font-weight:700;color:var(--green);">${item.count}x</td>
      <td class="bar-cell">
        <div class="reuse-bar">
          <div class="reuse-bar-fill" style="width:${(item.count / maxCount * 100).toFixed(0)}%"></div>
        </div>
      </td>
    </tr>
  `).join('');

  container.innerHTML = `
    <div class="savings-hero">
      <div class="big-number">${savings.saved}</div>
      <div class="big-label">extra purchases saved through ingredient overlap</div>
      <p style="margin-top:12px;color:var(--text-dim);font-size:0.88rem;">
        ${savings.unique_items} unique items to buy instead of ~${savings.total_slots} individual ingredient slots
      </p>
    </div>
    <table class="savings-table">
      <thead><tr><th>Ingredient</th><th>Reused</th><th>Overlap</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   EXPORTS
   ═══════════════════════════════════════════════════════════════ */

function downloadFile(filename, content, mime = 'text/plain') {
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Downloaded ' + filename);
}

/* ─── Full plan as .txt ─── */
function exportText() {
  const { plan, settings } = planData;
  let text = `NUTRIPLAN — ${settings.days}-Day ${settings.dietary} Meal Plan\n`;
  text += `Daily Target: ${settings.calories} kcal\n`;
  text += '='.repeat(55) + '\n\n';

  const weekdays = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  plan.forEach((day, i) => {
    const label = i < 7 ? weekdays[i] : `Day ${day.day}`;
    text += `--- ${label} (Day ${day.day}) ---\n`;
    day.meals.forEach(m => {
      text += `  [${m.category.padEnd(10)}] ${m.name.padEnd(40)} ~${m.calories} kcal\n`;
      text += `               ${m.cuisine} | ${m.nutrients}\n`;
    });
    text += `  Day Total: ${day.total_calories} kcal (${day.diff_pct > 0 ? '+' : ''}${day.diff_pct}%)\n\n`;
  });
  downloadFile('meal-plan.txt', text);
}

/* ─── Grocery list as .txt ─── */
function exportGroceryText() {
  const { grocery, savings } = planData;
  let text = 'NUTRIPLAN — SHOPPING LIST\n';
  text += '='.repeat(40) + '\n\n';

  for (const [aisle, items] of Object.entries(grocery)) {
    text += `[${aisle}]\n`;
    for (const [name, dishes] of Object.entries(items)) {
      text += `  [ ] ${name}  (${dishes.length} meal${dishes.length > 1 ? 's' : ''})\n`;
    }
    text += '\n';
  }
  text += `Total unique items: ${savings.unique_items}\n`;
  downloadFile('grocery-list.txt', text);
}

/* ─── Calendar .ics ─── */
function exportCalendar() {
  const { plan, settings } = planData;

  // Start from tomorrow
  const start = new Date();
  start.setDate(start.getDate() + 1);
  start.setHours(0, 0, 0, 0);

  let ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//NutriPlan//Meal Planner//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
  ];

  const pad = n => String(n).padStart(2, '0');
  const fmtDate = (d, h) =>
    `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(h)}0000`;

  const mealTimes = { 'Breakfast': 8, 'Snack': 11, 'Lunch': 13, 'Tea': 16, 'Dinner': 19 };

  plan.forEach((day, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);

    day.meals.forEach(m => {
      const hour = mealTimes[m.category] || 12;
      const uid = `nutriplan-${fmtDate(d, hour)}-${m.category}@nutriplan`;
      const summary = `${m.category}: ${m.name} (~${m.calories} kcal)`;
      const desc = `Ingredients: ${m.ingredients}\\nRecipe: ${m.recipe}\\nNutrients: ${m.nutrients}`;

      ics.push('BEGIN:VEVENT');
      ics.push(`DTSTART:${fmtDate(d, hour)}`);
      ics.push(`DTEND:${fmtDate(d, hour + 1)}`);
      ics.push(`SUMMARY:${summary}`);
      ics.push(`DESCRIPTION:${desc.replace(/\n/g, '\\n')}`);
      ics.push(`UID:${uid}`);
      ics.push('END:VEVENT');
    });
  });

  ics.push('END:VCALENDAR');
  downloadFile('meal-plan.ics', ics.join('\r\n'), 'text/calendar');
}
</script>
</body>
</html>
